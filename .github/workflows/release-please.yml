on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: simple

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from manifest
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content .release-please-manifest.json | ConvertFrom-Json)."."
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Publish
        run: dotnet publish UnBox3D/UnBox3D.csproj -c Release -r win-x64 --self-contained -p:Version=${{ steps.version.outputs.version }} --nologo -o publish

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath UnBox3D-${{ needs.release-please.outputs.tag_name }}.zip

      - name: Attach artifact to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: UnBox3D-${{ needs.release-please.outputs.tag_name }}.zip
